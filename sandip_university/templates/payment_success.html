{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .success-card {
            max-width: 560px;
            width: 100%;
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card success-card p-4 p-md-5 text-center">
            <div class="mb-4">
                <i class="fas fa-check-circle" style="font-size: 4rem; color: #16a34a;"></i>
            </div>
            <h2 class="mb-3">Payment Successful</h2>
            <p class="text-muted mb-4">Your fee payment has been completed successfully.</p>
            <div class="card bg-light border-0 mb-4">
                <div class="card-body">
                    <p class="mb-1"><strong>Student:</strong> {{ student.name }}</p>
                    <p class="mb-1"><strong>Amount Paid:</strong> ₹{{ payment.amount|floatformat:2 }}</p>
                    <p class="mb-0"><strong>Status:</strong> {{ payment.status }}</p>
                </div>
            </div>
            <a href="{% url 'dashboard' %}" class="btn btn-primary">Go to Dashboard</a>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"></script>
</body>
</html>
