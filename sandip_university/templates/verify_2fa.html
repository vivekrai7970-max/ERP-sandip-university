<!DOCTYPE html>
<html>
<head>
    <title>Verify 2FA</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right, #11998e, #38ef7d);
        }

        .container{
            width:400px;
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            color:#333;
            margin-bottom:30px;
        }

        .input-box{
            width:100%;
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
            outline:none;
        }

        .input-box input:focus{
            border-color:#007BFF;
        }

        .verify-btn{
            width:100%;
            padding:12px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:6px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        .verify-btn:hover{
            background:#0056b3;
        }

        .error{
            margin-top:15px;
            color:red;
            font-size:16px;
        }

    </style>

</head>
<body>

    <div class="container">

        <h2>Enter Authenticator Code</h2>

        <form method="POST">

            {% csrf_token %}

            <div class="input-box">

                <input type="text"
                       name="code"
                       placeholder="Enter 6-digit code"
                       required>

            </div>

            <button type="submit" class="verify-btn">
                Verify
            </button>

        </form>

        {% if error %}

            <div class="error">
                {{ error }}
            </div>

        {% endif %}

    </div>

</body>
</html>
